<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Petalyn</title>

    <link rel="icon" type="image/png" href="img/flor-bg-4.png">

    <link rel="stylesheet" href="global.css">
    <link rel="stylesheet" href="header.css">
    <link rel="stylesheet" href="home.css">
    <link rel="stylesheet" href="slider.css">

    <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>

    <link rel="stylesheet"
    href="https://unpkg.com/aos@2.3.1/dist/aos.css"/>
</head>

<body>

    <header>

        <nav id="navbar">

            <ul>

                <li class="nav_item">
                    <a href="home.html">Home</a>
                </li>

                <li class="nav_item">
                    <a href="catalogo.html">Catálogo</a>
                </li>

                <li class="logo_item">
                    <img src="img/logo.png"
                    class="logo"
                    alt="Logo Petalyn">
                </li>

                <li class="nav_item">
                    <a href="#">Contatos</a>
                </li>

                <li class="nav_item">
                    <a href="#">Sobre Nós</a>
                </li>

            </ul>

        </nav>

    </header>

    <section class="home-container">

        <div class="circle small-circle one"></div>
        <div class="circle small-circle two"></div>
        <div class="circle small-circle three"></div>

        <div class="texts" data-aos="fade-right">

            <p class="home-slogan"
            data-aos="fade-right"
            data-aos-delay="300">

                Flores que inspiram

            </p>

            <h1 class="home-title">

                Arranjos delicados criados
                para ocasiões inesquecíveis.

            </h1>

            <a href="#slider-section" class="btn-home">
                Me mostre mais!
            </a>

        </div>

        <div class="image-container" data-aos="zoom-in">

            <div class="pink-circle"></div>

            <img src="img/home-image-center.png"
            alt="Buquê de flores"
            class="home-image-center">

        </div>

    </section>

    <section id="slider-section">

        <h1 class="slider-title">
            Coleção Petalyn
        </h1>

        <div class="swiper mySwiper">

            <div class="swiper-wrapper">

                <div class="swiper-slide">

                    <div class="slide-content">

                        <div class="slide-circle pink"></div>

                        <img src="img/flor1.png"
                        alt=""
                        class="slide-image">

                    </div>

                </div>

                <div class="swiper-slide">

                    <div class="slide-content">

                        <div class="slide-circle yellow"></div>

                        <img src="img/flor4.png"
                        alt=""
                        class="slide-image">

                    </div>

                </div>

                <div class="swiper-slide">

                    <div class="slide-content">

                        <div class="slide-circle white"></div>

                        <img src="img/flor3.png"
                        alt=""
                        class="slide-image">

                    </div>

                </div>


            </div>

            <div class="swiper-button-next"></div>
            <div class="swiper-button-prev"></div>

        </div>

    </section>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>

    <script>

        AOS.init({
            duration: 1200,
            once: true
        });

        const swiper = new Swiper(".mySwiper", {

            loop: true,

            centeredSlides: true,

            slidesPerView: 1,

            speed: 1800,

           

            navigation: {
                nextEl: ".swiper-button-next",
                prevEl: ".swiper-button-prev",
            },

            autoplay: {
                delay: 4000,
                disableOnInteraction: false,
            },

        });

    </script>

</body>

</html>
